<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Schedule a tour to visit Roots & Wings Indy homeschool co-op in Indianapolis.">
  <meta name="theme-color" content="#2D6A3F">
  <title>Schedule a Tour — Roots & Wings Indy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="preload" href="logo-new.png" as="image">
  <link rel="preload" href="logo-style3.png" as="image">
  <link rel="preload" href="logo-mark.png" as="image">
  <link rel="preload" href="logo-mark.svg" as="image">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="logo-new.png" type="image/svg+xml">
</head>
<body>

  <!-- ====== Navigation ====== -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="nav-brand" aria-label="Roots & Wings Indy home">
        <img src="logo-new.png" alt="Roots & Wings Indy logo" width="60" height="60" onerror="this.style.display='none'">
        <div class="nav-brand-text">
          ROOTS AND WINGS
          <span>Indianapolis</span>
        </div>
      </a>

      <button class="nav-toggle" aria-label="Toggle navigation menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <div class="nav-links" role="menubar">
        <a href="index.html#about" role="menuitem">About</a>
        <a href="index.html#programs" role="menuitem">Programs</a>
        <a href="index.html#pricing" role="menuitem">Pricing</a>
        <a href="index.html#board" role="menuitem">Board</a>
        <a href="index.html#faq" role="menuitem">FAQ</a>
        <a href="index.html#support" role="menuitem">Support</a>
        <a href="index.html#contact" role="menuitem">Contact</a>
        <a href="members.html" class="btn btn-primary btn-sm" role="menuitem">Members</a>
      </div>
    </div>
  </nav>

  <!-- ====== Tour Form ====== -->
  <section class="tour-form-section" style="padding: 140px 0 80px;">
    <div class="container" style="max-width: 600px;">
      <h1 style="font-family: var(--font-heading); font-size: 2.2rem; color: var(--color-text); text-align: center; margin-bottom: 8px;">Schedule a Tour</h1>
      <p style="text-align: center; color: var(--color-text-light); margin-bottom: 40px; line-height: 1.7;">
        We'd love to welcome your family! Fill out the form below and we'll be in touch to find a time for you to visit during a co-op day.
      </p>

      <form name="schedule-tour" method="POST" data-netlify="true" action="/tour-thanks.html" style="display: flex; flex-direction: column; gap: 24px;">
        <input type="hidden" name="form-name" value="schedule-tour">
        <input type="hidden" name="subject" value="New Tour Request from Roots & Wings Website">

        <div>
          <label for="name" style="display: block; font-weight: 700; color: var(--color-text); margin-bottom: 6px; font-size: 0.95rem;">Your Name</label>
          <input type="text" id="name" name="name" required placeholder="First and Last Name"
            style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-body); font-size: 1rem; background: var(--color-white); color: var(--color-text); transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--color-primary)'" onblur="this.style.borderColor=''">
        </div>

        <div>
          <label for="email" style="display: block; font-weight: 700; color: var(--color-text); margin-bottom: 6px; font-size: 0.95rem;">Email</label>
          <input type="email" id="email" name="email" required placeholder="you@example.com"
            style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-body); font-size: 1rem; background: var(--color-white); color: var(--color-text); transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--color-primary)'" onblur="this.style.borderColor=''">
        </div>

        <div>
          <label for="phone" style="display: block; font-weight: 700; color: var(--color-text); margin-bottom: 6px; font-size: 0.95rem;">Phone Number</label>
          <input type="tel" id="phone" name="phone" required placeholder="(317) 555-1234"
            style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-body); font-size: 1rem; background: var(--color-white); color: var(--color-text); transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--color-primary)'" onblur="this.style.borderColor=''">
        </div>

        <div>
          <label for="num-kids" style="display: block; font-weight: 700; color: var(--color-text); margin-bottom: 6px; font-size: 0.95rem;">Number of Kids</label>
          <input type="number" id="num-kids" name="num-kids" required min="1" max="20" placeholder="2"
            style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-body); font-size: 1rem; background: var(--color-white); color: var(--color-text); transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--color-primary)'" onblur="this.style.borderColor=''">
        </div>

        <div>
          <label for="ages" style="display: block; font-weight: 700; color: var(--color-text); margin-bottom: 6px; font-size: 0.95rem;">Ages of Kids</label>
          <input type="text" id="ages" name="ages" required placeholder="e.g. 4, 7, and 10"
            style="width: 100%; padding: 12px 16px; border: 1px solid var(--color-border); border-radius: 8px; font-family: var(--font-body); font-size: 1rem; background: var(--color-white); color: var(--color-text); transition: border-color 0.2s;"
            onfocus="this.style.borderColor='var(--color-primary)'" onblur="this.style.borderColor=''">
        </div>

        <button type="submit" class="btn btn-primary" style="align-self: center; padding: 14px 48px; font-size: 1.05rem; margin-top: 8px;">
          Request a Tour
        </button>
      </form>
    </div>
  </section>

  <!-- ====== Footer ====== -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2025 Roots & Wings Indy. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
